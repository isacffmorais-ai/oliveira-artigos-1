<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oliveira Artigos</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Poppins', sans-serif;
background:#f8fafc;
color:#0f172a;
}

header{
background: linear-gradient(90deg,#2563eb,#1e3a8a);
color:white;
padding:20px;
text-align:center;
font-size:28px;
}

#usuario{
font-size:14px;
margin-top:5px;
}

nav{
display:flex;
justify-content:center;
gap:10px;
background:#60a5fa;
padding:10px;
}

nav button{
border:none;
padding:10px 20px;
border-radius:20px;
background:#2563eb;
color:white;
cursor:pointer;
transition:0.3s;
}

nav button:hover{
transform:scale(1.05);
}

.container{
padding:30px;
max-width:1100px;
margin:auto;
}

.tela{display:none;}
.ativa{display:block;}

input{
padding:10px;
margin:5px;
width:90%;
border-radius:8px;
border:1px solid #cbd5e1;
}

.produtos{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.produto{
background:white;
border-radius:12px;
padding:10px;
text-align:center;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
transition:0.3s;
}

.produto:hover{
transform:translateY(-5px);
}

.produto img{
width:100%;
height:180px;
object-fit:cover;
border-radius:8px;
}

button{
background: linear-gradient(135deg,#2563eb,#60a5fa);
border:none;
padding:10px;
border-radius:10px;
color:white;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}
</style>

</head>

<body>

<header>
Oliveira Artigos 🛍️
<p id="usuario"></p>
</header>

<nav>
<button onclick="mostrar('home')">Home</button>
<button onclick="mostrar('loja')">Loja</button>
<button onclick="mostrar('login')">Login</button>
<button onclick="mostrar('cadastro')">Cadastro</button>
<button onclick="abrirCarrinho()">Carrinho</button>
</nav>

<div class="container">

<div id="home" class="tela ativa">
<h2>Bem-vindo à Oliveira Artigos</h2>
<p>Moda moderna com estilo e qualidade 🔥</p>
</div>

<div id="loja" class="tela">
<h2>Produtos</h2>

<div class="produtos">

<div class="produto">
<img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab">
<h3>Camiseta</h3>
<p>R$ 79</p>
<button onclick="addCarrinho('Camiseta',79)">Comprar</button>
</div>

<div class="produto">
<img src="https://images.unsplash.com/photo-1541099649105-f69ad21f3246">
<h3>Calça Jeans</h3>
<p>R$ 149</p>
<button onclick="addCarrinho('Calça Jeans',149)">Comprar</button>
</div>

<div class="produto">
<img src="https://images.unsplash.com/photo-1529139574466-a303027c1d8b">
<h3>Jaqueta</h3>
<p>R$ 199</p>
<button onclick="addCarrinho('Jaqueta',199)">Comprar</button>
</div>

<div class="produto">
<img src="https://images.unsplash.com/photo-1512436991641-6745cdb1723f">
<h3>Vestido</h3>
<p>R$ 129</p>
<button onclick="addCarrinho('Vestido',129)">Comprar</button>
</div>

</div>
</div>

<div id="login" class="tela">
<h2>Login</h2>
<input id="email" placeholder="Email"><br>
<input id="senha" type="password" placeholder="Senha"><br>
<button onclick="login()">Entrar</button>
</div>

<div id="cadastro" class="tela">
<h2>Criar Conta</h2>
<input id="emailCad" placeholder="Email"><br>
<input id="senhaCad" type="password" placeholder="Senha"><br>
<button onclick="cadastrar()">Cadastrar</button>
</div>

<div id="carrinho" class="tela">
<h2>Carrinho</h2>
<ul id="lista"></ul>
<p id="total"></p>
<div id="checkout-btn"></div>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<script>

const firebaseConfig={
apiKey:"AIzaSyDoZfPMpTiSIO-iLpntGGyFR1Mq7Ak9jBc",
authDomain:"oliveira-artios.firebaseapp.com",
projectId:"oliveira-artios",
storageBucket:"oliveira-artios.firebasestorage.app",
messagingSenderId:"245567533464",
appId:"1:245567533464:web:b87fc0ebcc8802232fbbed",
measurementId:"G-4P71TME6BF"
};

firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();

let carrinho=[];

function mostrar(t){
document.querySelectorAll('.tela').forEach(el=>el.classList.remove('ativa'));
document.getElementById(t).classList.add('ativa');
}

function cadastrar(){
const email=document.getElementById("emailCad").value;
const senha=document.getElementById("senhaCad").value;

if(email==""||senha==""){
alert("Preencha tudo!");
return;
}

auth.createUserWithEmailAndPassword(email,senha)
.then(()=>{
alert("Conta criada!");
mostrar('login');
})
.catch(e=>alert(e.message));
}

function login(){
const email=document.getElementById("email").value;
const senha=document.getElementById("senha").value;

auth.signInWithEmailAndPassword(email,senha)
.then(()=>{
alert("Logado!");
mostrar('home');
})
.catch(e=>alert(e.message));
}

auth.onAuthStateChanged(user=>{
if(user){
document.getElementById("usuario").innerText="Logado: "+user.email;
}
});

function addCarrinho(nome,preco){
carrinho.push({nome,preco});
alert("Adicionado ao carrinho!");
}

function abrirCarrinho(){

mostrar('carrinho');

let total=0;
let lista=document.getElementById("lista");

lista.innerHTML="";

carrinho.forEach((i,index)=>{

lista.innerHTML+=`
<li>
${i.nome} - R$ ${i.preco}
<button onclick="remover(${index})">Remover</button>
</li>
`;

total+=i.preco;

});

document.getElementById("total").innerText="Total: R$ "+total;

document.getElementById("checkout-btn").innerHTML="<button onclick='pagar()'>Pagar</button>";
}

function remover(index){
carrinho.splice(index,1);
abrirCarrinho();
}

function pagar(){

if(carrinho.length==0){
alert("Carrinho vazio");
return;
}

let total=0;

carrinho.forEach(p=>{
total+=p.preco;
});

let pix="42778546804";

alert("Total da compra: R$ "+total+
"\n\nPague no PIX:\n"+pix);

}

</script>

</body>
</html>
